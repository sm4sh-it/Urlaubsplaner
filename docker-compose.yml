
services:
  urlaubsplaner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm4sh-urlaubsplaner
    restart: always
    ports:
      - "8666:8666"
    volumes:
      # Mount the database directory so it persists across container restarts
      - urlaubsplaner_data:/app/data
    environment:
      # Aktiviere den Passwortschutz (true) oder deaktiviere ihn komplett (false)
      - AUTH_ENABLED=true
      # Das zwingend erforderliche Passwort, wenn AUTH_ENABLED=true ist
      - APP_PASSWORD=sm4sh

volumes:
  urlaubsplaner_data:
