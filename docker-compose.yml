version: '3.8'

services:
  urlaubsplaner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm4sh-urlaubsplaner
    restart: always
    ports:
      - "8666:8666"
    volumes:
      # Mount the database directory so it persists across container restarts
      - urlaubsplaner_data:/app/data

volumes:
  urlaubsplaner_data:
