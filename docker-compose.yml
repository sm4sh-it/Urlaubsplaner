version: '3.8'

services:
  urlaubsplaner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm4sh-urlaubsplaner
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # Mount the database so it persists across container restarts
      - ./prisma/dev.db:/app/prisma/dev.db
